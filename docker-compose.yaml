services:
  frontend:
    image: ghcr.io/${GH_USERNAME_LOWERCASE}/${APP_NAME_LOWERCASE}-frontend:latest
    build:
      context: ./frontend               # docker compose build    um das Image lokal zu bauen
    container_name: ${APP_NAME_LOWERCASE}-frontend
    #restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
    environment:
      - BACKEND_PORT=${BACKEND_PORT}
  backend:
    image: ghcr.io/${GH_USERNAME_LOWERCASE}/${APP_NAME_LOWERCASE}-backend:latest
    build:
      context: ./backend                # docker compose build    um das Image lokal zu bauen
      args:
        - PORT=${BACKEND_PORT}
    container_name: ${APP_NAME_LOWERCASE}-backend
    #restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - PORT=${BACKEND_PORT}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    command: --interval 30
    environment:
      - REPO_USER=${GH_USERNAME}
      - REPO_PASS=${GH_PACKAGE_TOKEN}
      - WATCHTOWER_CLEANUP=true        
      - WATCHTOWER_INTERVAL=300         # in Sekunden 
      - WATCHTOWER_LABEL_ENABLE=true